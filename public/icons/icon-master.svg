<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c3c63"/>
      <stop offset="0.55" stop-color="#13294a"/>
      <stop offset="1" stop-color="#0a1830"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#cdd6e2"/>
      <stop offset="1" stop-color="#8b97a8"/>
    </linearGradient>
    <linearGradient id="silverDim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c7d0dc"/>
      <stop offset="1" stop-color="#6f7c8f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe79a"/>
      <stop offset="0.5" stop-color="#f0b429"/>
      <stop offset="1" stop-color="#b87814"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="32" y="32" width="960" height="960" rx="200" fill="url(#bg)"/>
  <rect x="32" y="32" width="960" height="960" rx="200" fill="none" stroke="#9fb0c6" stroke-opacity="0.55" stroke-width="10"/>

  <!-- buildings (silver) -->
  <g fill="url(#silverDim)">
    <rect x="600" y="250" width="70" height="560" rx="10"/>
    <rect x="690" y="350" width="60" height="460" rx="10"/>
    <rect x="772" y="450" width="52" height="360" rx="10"/>
  </g>

  <!-- letter A (silver) -->
  <path d="M 360 175 L 205 815 M 360 175 L 515 815 M 268 590 L 452 590"
        fill="none" stroke="url(#silver)" stroke-width="104"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- letter C (gold) -->
  <path d="M 565 470 A 150 150 0 1 0 565 700"
        fill="none" stroke="url(#gold)" stroke-width="92"
        stroke-linecap="round"/>

  <!-- rising bar chart (gold) -->
  <g fill="url(#gold)">
    <rect x="600" y="730" width="38" height="80" rx="6"/>
    <rect x="654" y="690" width="38" height="120" rx="6"/>
    <rect x="708" y="640" width="38" height="170" rx="6"/>
    <rect x="762" y="585" width="38" height="225" rx="6"/>
  </g>
  <!-- up arrow over the bars -->
  <path d="M 590 740 Q 700 700 815 560" fill="none" stroke="url(#gold)" stroke-width="20" stroke-linecap="round"/>
  <path d="M 770 560 L 828 548 L 812 606 Z" fill="url(#gold)"/>

  <!-- base shelf -->
  <rect x="170" y="812" width="680" height="26" rx="13" fill="url(#silverDim)"/>
</svg>
